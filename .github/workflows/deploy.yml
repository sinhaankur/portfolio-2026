name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# One concurrent deploy at a time; cancel any in-flight run that gets queued.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brutalist-void-portfolio-template
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: brutalist-void-portfolio-template/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build (Next.js static export)
        run: pnpm build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # next.config.mjs sets `output: "export"`, which writes the static site to `out/`.
          path: brutalist-void-portfolio-template/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
