# Netlify configuration — the live site is now the Next.js portfolio
# inside brutalist-void-portfolio-template/. The legacy static site has been
# parked in _archive_legacy/ and is no longer published.

[build]
  base       = "brutalist-void-portfolio-template"
  command    = "pnpm install --frozen-lockfile=false && pnpm build"
  publish    = "brutalist-void-portfolio-template/.next"

[build.environment]
  # Pin Node major to a version Next.js 16 supports.
  NODE_VERSION = "20"
  NPM_FLAGS    = "--legacy-peer-deps"

# Netlify's official Next.js runtime handles SSR, ISR, and image optimisation.
[[plugins]]
  package = "@netlify/plugin-nextjs"
