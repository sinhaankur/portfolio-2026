<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!--
    Ankur Sinha — favicon.
    Brand mark: a sun (accent-red dot) ringed by two thin orbits, one of which
    carries a small planet dot. Echoes the navbar logo's accent dot, the galaxy
    hero's solar system, and the Unhosted trust-radius concentric-circle motif.
    Reads at 16px and against any browser-chrome colour.
  -->
  <rect width="32" height="32" rx="7" fill="#0a0a0a"/>

  <!-- Outer orbit -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#fafafa" stroke-opacity="0.65" stroke-width="1"/>
  <!-- Inner orbit -->
  <circle cx="16" cy="16" r="6.5" fill="none" stroke="#fafafa" stroke-opacity="0.55" stroke-width="1"/>

  <!-- Sun -->
  <circle cx="16" cy="16" r="2.6" fill="#ff3b30"/>

  <!-- Planet on outer orbit (upper-right at ~30°) -->
  <circle cx="25.5" cy="10.5" r="1.7" fill="#fafafa"/>
</svg>
